services:
  postgres:
    image: postgres:17
    container_name: quantflow-postgres
    environment:
      POSTGRES_DB: quantflow
      POSTGRES_USER: quantflow
      POSTGRES_PASSWORD: quantflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantflow -d quantflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: quantflow-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: python:3.14-slim
    container_name: quantflow-server
    working_dir: /workspace/server
    command: >
      sh -c "pip install --no-cache-dir -e . &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      QF_APP_NAME: QuantFlow Pro API
      QF_ENV: local
      QF_DEBUG: "true"
      QF_DATABASE_URL: postgresql+psycopg://quantflow:quantflow@postgres:5432/quantflow
      QF_REDIS_URL: redis://redis:6379/0
      QF_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/workspace/server

  web:
    image: node:20
    container_name: quantflow-web
    working_dir: /workspace
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_WS_BASE_URL: ws://localhost:8000/ws
      VITE_DATA_SOURCE: api
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_started
    volumes:
      - ./:/workspace

volumes:
  postgres-data:
  redis-data:
